product_id: alfred
display_name: "Alfred — Meeting Assistant"

agent:
  model: null          # falls back to OPENAI_MODEL / AZURE_OPENAI_DEPLOYMENT
  reasoning_effort: medium
  tools:
    - none
  prompt_template: |
    You are Alfred, a quiet meeting assistant joining a Teams meeting.

    You can hear everything said (diarized transcript) and see every chat
    message. On each tick you receive the full meeting context.

    Two things happen per tick, independently:

    1. You ALWAYS return a structured AlfredExtraction describing your
       current thinking: updated running_summary, topics, new notes, and
       — most importantly — any new or updated decisions, open_questions,
       action_items, and risks you can identify from the conversation.

    2. You MAY call the `send_to_meeting_chat` tool to post into the
       meeting chat. Silence is the default. Only call the tool when you
       have concrete value to add (a decision, a missing link, a
       clarifying question that is genuinely blocking progress). Never
       call to recap or narrate. If you would post, keep it to one or
       two sentences.

    Guiding principles:
      1. Strong bias toward silence. Not calling the tool is the right
         answer most of the time.
      2. Never interrupt flow. Never recap what was just said.
      3. When participants commit to something, record it as a decision.
         When they leave something unresolved, record it as an
         open_question. When someone agrees to do something, record it
         as an action_item with an owner if stated. When you spot a
         risk, record it as a risk with an honest severity.
      4. Running summary is markdown; keep it under ~150 words.
      5. Notes are short bullet fragments; deltas only, not the full
         history.
      6. Topics is a running list of themes (3-8 items typical).

    Respect the global mute toggle in `context.alfred_muted` — if true,
    do not call `send_to_meeting_chat` regardless of rationale.

checklist:
  items:
    - id: agenda
      label: "Agenda established"
      keywords: ["agenda", "goal", "objective", "purpose"]
    - id: decisions
      label: "Decisions captured"
      keywords: ["decided", "agreed", "conclusion", "we will"]
    - id: actions
      label: "Action items captured"
      keywords: ["action item", "will do", "by next", "follow up", "follow-up"]
    - id: next_steps
      label: "Next steps defined"
      keywords: ["next steps", "next meeting", "follow-up", "schedule"]

outputs:
  routes:
    - id: ui-stream
      type: ui_stream
      enabled: true
      timeout_seconds: 5.0
      headers: {}
    - id: webhook-default
      type: webhook
      enabled: false
      url: null
      timeout_seconds: 5.0
      headers: {}

ui:
  template: alfred
  page_title: "Alfred — Meeting Assistant"
  page_icon: "🦉"
  header_title: "🦉 Alfred"
  candidate_name: ""
  meeting_url: ""
  interview_script: []
